org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Some third-party plugins (e.g. flutter_avif_android) compile Java and Kotlin
# with different JVM targets. Relax the strict equality check to a warning;
# the mixed bytecode dexes fine for Android.
kotlin.jvm.target.validation.mode=warning
# The build dir is redirected to D:\ while some plugin sources live in the
# pub cache on C:\. Kotlin's incremental cache can't relativize across drive
# roots, so disable incremental compilation.
kotlin.incremental=false
